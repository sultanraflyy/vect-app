name: Content Generation

on:
  schedule:
    # Run every Sunday at 08:00 UTC
    - cron: '0 8 * * 0'
  workflow_dispatch:
    inputs:
      channel:
        description: 'Specific channel to generate (leave empty for all)'
        required: false
        default: ''
        type: choice
        options:
          - ''
          - reddit
          - linkedin
          - x-thread
          - instagram
          - outreach
          - community
          - blog

permissions:
  contents: write
  issues: write

jobs:
  detect-trends:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run trend detection
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: node agents/trend-detector.js
        continue-on-error: true

      - name: Upload trend signals
        uses: actions/upload-artifact@v4
        with:
          name: trend-signals
          path: content/signals/
          retention-days: 30

  generate-content:
    needs: detect-trends
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Download trend signals
        uses: actions/download-artifact@v4
        with:
          name: trend-signals
          path: content/signals/
        continue-on-error: true

      - name: Generate content
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          if [ -n "${{ github.event.inputs.channel }}" ]; then
            node agents/engine.js --channel "${{ github.event.inputs.channel }}"
          else
            node agents/engine.js
          fi

      - name: Commit and push content
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add content/ web/blog/
          if git diff --staged --quiet; then
            echo "No new content to commit"
          else
            DATE=$(date +%Y-%m-%d)
            git commit -m "content: auto-generated weekly content ($DATE)"
            
            # Matikan rebase dan suruh Git otomatis memilih file lokal (ours) jika ada tabrakan
            git config pull.rebase false
            git pull origin master -X ours --no-edit
            
            git push
          fi

      - name: 🚀 Trigger Make.com Distribution
        env:
          MAKECOM_WEBHOOK_URL: ${{ secrets.MAKECOM_WEBHOOK_URL }}
        run: |
          echo "Sending real payload to Make.com..."
          if [ -f "content/latest-payload.json" ]; then
            curl -X POST -H "Content-Type: application/json" -d @content/latest-payload.json $MAKECOM_WEBHOOK_URL
            echo "Payload sent!"
          else
            echo "Error: content/latest-payload.json not found!"
            exit 1
          fi

  notify-on-failure:
    needs: generate-content
    if: failure()
    runs-on: ubuntu-latest
    steps:
      - name: Create failure issue
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `Content Generation Failed - ${new Date().toISOString().split('T')[0]}`,
              body: `The weekly content generation workflow failed.\n\nRun: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}\n\nPlease investigate and manually generate content if needed.`,
              labels: ['content-generation-failure']
            });
