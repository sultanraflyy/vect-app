name: Content Generation

on:
  schedule:
    # Run every Sunday at 08:00 UTC
    - cron: '0 8 * * 0'
  workflow_dispatch:
    inputs:
      channel:
        description: 'Specific channel to generate (leave empty for all)'
        required: false
        default: ''
        type: choice
        options:
          - ''
          - reddit
          - linkedin
          - x-thread
          - instagram
          - outreach
          - community
          - blog

permissions:
  contents: write
  issues: write

jobs:
  detect-trends:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run trend detection
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: node agents/trend-detector.js
        continue-on-error: true

      - name: Upload trend signals
        uses: actions/upload-artifact@v4
        with:
          name: trend-signals
          path: content/signals/
          retention-days: 30

  generate-content:
    needs: detect-trends
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Download trend signals
        uses: actions/download-artifact@v4
        with:
          name: trend-signals
          path: content/signals/
        continue-on-error: true

      - name: Generate content
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          if [ -n "${{ github.event.inputs.channel }}" ]; then
            node agents/engine.js --channel "${{ github.event.inputs.channel }}"
          else
            node agents/engine.js
          fi

      - name: Validate payload before commit
        id: validate
        run: |
          if [ ! -f "content/latest-payload.json" ]; then
            echo "❌ ERROR: latest-payload.json not found!"
            echo "payload_valid=false" >> $GITHUB_OUTPUT
            exit 0
          fi
          
          # Check if at least one channel is ready
          READY_COUNT=$(jq '[.linkedin_ready, .twitter_ready, .instagram_ready, .outreach_ready] | map(select(. == true)) | length' content/latest-payload.json)
          
          echo "Ready channels: $READY_COUNT/4"
          
          if [ "$READY_COUNT" -eq 0 ]; then
            echo "⚠️  WARNING: No channels are ready (all false)"
            echo "This will waste Make.com credits!"
            echo "payload_valid=false" >> $GITHUB_OUTPUT
          else
            echo "✅ Payload valid: $READY_COUNT channels ready"
            echo "payload_valid=true" >> $GITHUB_OUTPUT
          fi

      - name: Commit and push content
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add content/ web/blog/
          if git diff --staged --quiet; then
            echo "No new content to commit"
          else
            DATE=$(date +%Y-%m-%d)
            git commit -m "content: auto-generated weekly content ($DATE)"
            
            # Matikan rebase dan suruh Git otomatis memilih file lokal (ours) jika ada tabrakan
            git config pull.rebase false
            git pull origin master -X ours --no-edit
            
            git push
          fi

      - name: 🚀 Trigger Make.com Distribution (Fire-and-Forget)
        if: steps.validate.outputs.payload_valid == 'true'
        env:
          MAKECOM_WEBHOOK_URL: ${{ secrets.MAKECOM_WEBHOOK_URL }}
        run: |
          echo "Sending payload to Make.com (fire-and-forget mode)..."
          
          if [ -f "content/latest-payload.json" ]; then
            # Show what we're sending
            echo "Payload content:"
            cat content/latest-payload.json
            echo ""
            
            # Send webhook in background with --max-time 5 (don't wait for response)
            curl -X POST \
              -H "Content-Type: application/json" \
              -d @content/latest-payload.json \
              --max-time 5 \
              --connect-timeout 5 \
              $MAKECOM_WEBHOOK_URL > /dev/null 2>&1 &
            
            echo "✅ Webhook sent to Make.com (not waiting for response)"
            echo "Make.com will process this asynchronously"
            
            # Give curl 1 second to send the request, then move on
            sleep 1
            
          else
            echo "❌ Error: content/latest-payload.json not found!"
            exit 1
          fi

      - name: ⚠️  Skip Make.com (invalid payload)
        if: steps.validate.outputs.payload_valid == 'false'
        run: |
          echo "❌ Skipping Make.com webhook - payload invalid or empty"
          echo "This prevents wasting Make.com credits on empty data"
          echo ""
          echo "Check the 'Generate content' step logs to see what went wrong"

  notify-on-failure:
    needs: generate-content
    if: failure()
    runs-on: ubuntu-latest
    steps:
      - name: Create failure issue
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `Content Generation Failed - ${new Date().toISOString().split('T')[0]}`,
              body: `The weekly content generation workflow failed.\n\nRun: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}\n\nPlease investigate and manually generate content if needed.`,
              labels: ['content-generation-failure']
            });
