<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Blog — Vect</title>
  <meta name="description" content="Insights on AI verification, digital provenance, and trust infrastructure from the Vect team." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #0a0a0a;
      --surface: #111111;
      --border: #1a1a1a;
      --text: #e5e5e5;
      --text-secondary: #888888;
      --accent: #3b82f6;
      --accent-dim: rgba(59, 130, 246, 0.1);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', sans-serif;
      font-size: 15px;
      line-height: 1.7;
      min-height: 100vh;
    }

    a { color: inherit; }

    /* Nav */
    nav {
      border-bottom: 1px solid var(--border);
      padding: 0 1.5rem;
      height: 56px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      background: rgba(10,10,10,0.85);
      backdrop-filter: blur(12px);
      z-index: 50;
    }
    nav .logo {
      font-size: 1rem;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-decoration: none;
      color: var(--text);
    }
    nav .nav-links { display: flex; gap: 1.5rem; }
    nav .nav-links a {
      font-size: 0.85rem;
      color: var(--text-secondary);
      text-decoration: none;
      transition: color 0.15s;
    }
    nav .nav-links a:hover { color: var(--text); }

    /* Layout */
    .container {
      max-width: 720px;
      margin: 0 auto;
      padding: 4rem 1.5rem;
    }

    /* Header */
    .page-header { margin-bottom: 3rem; }
    .page-header h1 {
      font-size: 1.75rem;
      font-weight: 600;
      letter-spacing: -0.02em;
      margin-bottom: 0.5rem;
    }
    .page-header p {
      color: var(--text-secondary);
      font-size: 0.95rem;
    }

    /* Post cards */
    .post-card {
      display: block;
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 1.5rem;
      margin-bottom: 1rem;
      background: var(--surface);
      text-decoration: none;
      color: inherit;
      transition: border-color 0.15s, background 0.15s;
    }
    .post-card:hover {
      border-color: #2a2a2a;
      background: #161616;
    }

    .post-meta {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      font-size: 0.8rem;
      color: var(--text-secondary);
      margin-bottom: 0.75rem;
    }
    .tag {
      background: var(--accent-dim);
      color: var(--accent);
      padding: 0.15rem 0.5rem;
      border-radius: 4px;
      font-size: 0.75rem;
      font-weight: 500;
    }

    .post-card h2 {
      font-size: 1rem;
      font-weight: 600;
      letter-spacing: -0.01em;
      margin-bottom: 0.4rem;
      line-height: 1.4;
    }
    .post-card p {
      font-size: 0.875rem;
      color: var(--text-secondary);
      line-height: 1.6;
    }

    /* Footer */
    footer {
      border-top: 1px solid var(--border);
      padding: 2rem 1.5rem;
      text-align: center;
      font-size: 0.8rem;
      color: var(--text-secondary);
    }
    footer a { color: var(--text-secondary); text-decoration: none; }
    footer a:hover { color: var(--text); }
  </style>
</head>
<body>

  <nav>
    <a class="logo" href="https://tryvect.com">VECT</a>
    <div class="nav-links">
      <a href="https://tryvect.com#features">Features</a>
      <a href="https://tryvect.com#pricing">Pricing</a>
      <a href="https://tryvect.com/blog" style="color:var(--text)">Blog</a>
    </div>
  </nav>

  <div class="container">
    <div class="page-header">
      <h1>Blog</h1>
      <p>Insights on AI verification, digital provenance, and trust infrastructure.</p>
    </div>

    <div id="posts-container">
      <!-- Posts loaded from manifest.json -->
      <p style="color:var(--text-secondary);text-align:center;padding:3rem 0">Loading posts...</p>
    </div>
  </div>

  <footer>
    <a href="https://tryvect.com">tryvect.com</a>
  </footer>

  <script>
    async function loadPosts() {
      const container = document.getElementById('posts-container');
      try {
        const res = await fetch('posts/manifest.json');
        if (!res.ok) throw new Error('manifest not found');
        const posts = await res.json();
        if (!posts.length) {
          container.innerHTML = '<p style="color:var(--text-secondary);text-align:center;padding:3rem 0">No posts yet — check back soon.</p>';
          return;
        }
        container.innerHTML = posts.map(p => `
          <a class="post-card" href="post.html?slug=${encodeURIComponent(p.slug)}">
            <div class="post-meta">
              <span>${p.date}</span>
              <span class="tag">${p.tag}</span>
              <span>${p.readTime} min read</span>
            </div>
            <h2>${p.title}</h2>
            <p>${p.description}</p>
          </a>
        `).join('');
      } catch (e) {
        container.innerHTML = '<p style="color:var(--text-secondary);text-align:center;padding:3rem 0">Could not load posts.</p>';
      }
    }
    loadPosts();
  </script>

</body>
</html>
