<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Post — Vect Blog</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #0a0a0a;
      --surface: #111111;
      --border: #1a1a1a;
      --text: #e5e5e5;
      --text-secondary: #888888;
      --accent: #3b82f6;
      --accent-dim: rgba(59, 130, 246, 0.1);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', sans-serif;
      font-size: 16px;
      line-height: 1.8;
      min-height: 100vh;
    }

    /* Nav */
    nav {
      border-bottom: 1px solid var(--border);
      padding: 0 1.5rem;
      height: 56px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      background: rgba(10,10,10,0.85);
      backdrop-filter: blur(12px);
      z-index: 50;
    }
    nav .logo {
      font-size: 1rem;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-decoration: none;
      color: var(--text);
    }
    nav .back-link {
      font-size: 0.85rem;
      color: var(--text-secondary);
      text-decoration: none;
      display: flex;
      align-items: center;
      gap: 0.4rem;
      transition: color 0.15s;
    }
    nav .back-link:hover { color: var(--text); }

    /* Article */
    .container {
      max-width: 680px;
      margin: 0 auto;
      padding: 4rem 1.5rem;
    }

    .post-meta {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      font-size: 0.8rem;
      color: var(--text-secondary);
      margin-bottom: 1.5rem;
    }
    .tag {
      background: var(--accent-dim);
      color: var(--accent);
      padding: 0.15rem 0.5rem;
      border-radius: 4px;
      font-size: 0.75rem;
      font-weight: 500;
    }

    #post-title {
      font-size: 1.75rem;
      font-weight: 600;
      letter-spacing: -0.02em;
      line-height: 1.3;
      margin-bottom: 2.5rem;
    }

    /* Prose */
    #post-content h1, #post-content h2, #post-content h3 {
      font-weight: 600;
      letter-spacing: -0.01em;
      margin-top: 2rem;
      margin-bottom: 0.75rem;
    }
    #post-content h1 { font-size: 1.4rem; }
    #post-content h2 { font-size: 1.15rem; }
    #post-content h3 { font-size: 1rem; }
    #post-content p { margin-bottom: 1.25rem; color: var(--text); }
    #post-content ul, #post-content ol {
      margin-bottom: 1.25rem;
      padding-left: 1.5rem;
    }
    #post-content li { margin-bottom: 0.4rem; }
    #post-content strong { font-weight: 600; color: var(--text); }
    #post-content em { font-style: italic; }
    #post-content hr {
      border: none;
      border-top: 1px solid var(--border);
      margin: 2rem 0;
    }
    #post-content blockquote {
      border-left: 3px solid var(--accent);
      padding-left: 1rem;
      color: var(--text-secondary);
      margin-bottom: 1.25rem;
    }
    #post-content code {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.85em;
      background: var(--surface);
      border: 1px solid var(--border);
      padding: 0.15rem 0.4rem;
      border-radius: 4px;
    }
    #post-content pre {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 1.25rem;
      overflow-x: auto;
      margin-bottom: 1.25rem;
    }
    #post-content pre code {
      background: none;
      border: none;
      padding: 0;
    }
    #post-content a { color: var(--accent); text-decoration: none; }
    #post-content a:hover { text-decoration: underline; }

    /* Footer */
    footer {
      border-top: 1px solid var(--border);
      padding: 2rem 1.5rem;
      text-align: center;
      font-size: 0.8rem;
      color: var(--text-secondary);
    }
    footer a { color: var(--text-secondary); text-decoration: none; }
    footer a:hover { color: var(--text); }

    /* Loading/error states */
    .state-msg {
      color: var(--text-secondary);
      text-align: center;
      padding: 4rem 0;
    }
  </style>
</head>
<body>

  <nav>
    <a class="logo" href="https://tryvect.com">VECT</a>
    <a class="back-link" href="index.html">
      ← Blog
    </a>
  </nav>

  <div class="container">
    <div id="post-meta-bar" class="post-meta" style="display:none"></div>
    <h1 id="post-title"></h1>
    <div id="post-content"></div>
  </div>

  <footer>
    <a href="https://tryvect.com">tryvect.com</a>
    &nbsp;·&nbsp;
    <a href="index.html">Blog</a>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script>
    function parseFrontmatter(text) {
      const match = text.match(/^---\n([\s\S]*?)\n---\n?([\s\S]*)$/);
      if (!match) return { fm: {}, body: text };
      const fm = {};
      for (const line of match[1].split('\n')) {
        const idx = line.indexOf(':');
        if (idx === -1) continue;
        let key = line.slice(0, idx).trim();
        let val = line.slice(idx + 1).trim().replace(/^["']|["']$/g, '');
        fm[key] = val;
      }
      return { fm, body: match[2] };
    }

    function deriveTag(fm) {
      if (fm.category) return fm.category;
      if (fm.keywords) {
        const first = fm.keywords.replace(/^\["?/, '').replace(/"?,.*/, '').trim();
        if (first.length > 0 && first.length < 25) {
          const w = first.split(' ').pop();
          return w.charAt(0).toUpperCase() + w.slice(1);
        }
      }
      return 'Vect';
    }

    function estimateReadTime(body) {
      const words = body.trim().split(/\s+/).length;
      return Math.max(1, Math.round(words / 200));
    }

    async function loadPost() {
      const slug = new URLSearchParams(location.search).get('slug');
      if (!slug) { location.href = 'index.html'; return; }

      const titleEl = document.getElementById('post-title');
      const contentEl = document.getElementById('post-content');
      const metaEl = document.getElementById('post-meta-bar');

      titleEl.textContent = 'Loading...';

      try {
        const res = await fetch(`posts/${encodeURIComponent(slug)}.md`);
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        const text = await res.text();
        const { fm, body } = parseFrontmatter(text);

        const title = fm.title || slug;
        const date = fm.date || '';
        const tag = deriveTag(fm);
        const readTime = estimateReadTime(body);

        document.title = `${title} — Vect Blog`;

        titleEl.textContent = title;

        metaEl.style.display = 'flex';
        metaEl.innerHTML = `
          ${date ? `<span>${date}</span>` : ''}
          <span class="tag">${tag}</span>
          <span>${readTime} min read</span>
        `;

        marked.setOptions({ breaks: true, gfm: true });
        contentEl.innerHTML = marked.parse(body);
      } catch (e) {
        titleEl.textContent = '';
        contentEl.innerHTML = `<p class="state-msg">Post not found. <a href="index.html" style="color:var(--accent)">Back to Blog</a></p>`;
      }
    }

    loadPost();
  </script>

</body>
</html>
